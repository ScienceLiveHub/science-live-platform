# Run quick checks on PRs/main that span multiple workspaces.

name: Full Monorepo Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    description: Check the code and build for all workspaces

env:
  NODE_VERSION: "24"

jobs:
  # Only needed when relying on local nanopub-js, not npm package
  build-nanopub-js:
    name: Build nanopub-js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nanopub-js repo
        uses: actions/checkout@v6
        with:
          repository: vijay-prema/nanopub-js
          path: nanopub-js
          ref: custom-uri-fix
          token: ${{ env.GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup yarn
        run: corepack enable

      - name: Disable yarn global cache for workflow environment
        working-directory: ./nanopub-js
        run: 'echo "enableGlobalCache: false" >> .yarnrc.yml'

      - name: Switch from prepare to prepack to prevent npm install error
        working-directory: ./nanopub-js
        run: sed -i 's/prepare/prepack/g' package.json

      - name: Install dependencies
        working-directory: ./nanopub-js
        run: yarn install

      - name: Build
        working-directory: ./nanopub-js
        run: yarn build

      - name: Upload nanopub-js artifact
        uses: actions/upload-artifact@v5
        with:
          name: nanopub-js
          path: nanopub-js
          retention-days: 1

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: build-nanopub-js
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: nanopub-js
          path: ../nanopub-js

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Build and cache the output of npm install to use in other workflows
      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            api/node_modules
            zotero/node_modules
            homepage/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: [build-nanopub-js, install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Only needed when relying on local nanopub-js, not npm package
      - name: Download nanopub-js artifact
        uses: actions/download-artifact@v8
        with:
          name: nanopub-js
          path: ../nanopub-js

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            api/node_modules
            zotero/node_modules
            homepage/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || echo "No lint script configured"

      - name: Typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Build
        working-directory: ./frontend
        run: npm run check

      - name: Test
        working-directory: ./frontend
        run: npm run test

  api-check:
    name: API Checks
    runs-on: ubuntu-latest
    needs: [build-nanopub-js, install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Only needed when relying on local nanopub-js, not npm package
      - name: Download nanopub-js artifact
        uses: actions/download-artifact@v8
        with:
          name: nanopub-js
          path: ../nanopub-js

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            api/node_modules
            zotero/node_modules
            homepage/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Lint
        working-directory: ./api
        run: npm run lint || echo "No lint script configured"

      - name: Typecheck
        working-directory: ./api
        run: npx tsc --noEmit

      - name: Copy wrangler config
        working-directory: ./api
        run: cp wrangler.jsonc.example wrangler.jsonc

      - name: Build
        working-directory: ./api
        run: npm run check

  zotero-check:
    name: Zotero Checks
    runs-on: ubuntu-latest
    needs: [build-nanopub-js, install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Only needed when relying on local nanopub-js, not npm package
      - name: Download nanopub-js artifact
        uses: actions/download-artifact@v8
        with:
          name: nanopub-js
          path: ../nanopub-js

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            api/node_modules
            zotero/node_modules
            homepage/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Lint
        working-directory: ./zotero
        run: npm run lint:check

      - name: Build
        working-directory: ./zotero
        run: npm run build
