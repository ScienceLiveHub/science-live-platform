# Creates a release for zotero plugin, currently only manually triggered

name: Zotero Plugin Release

on:
  workflow_dispatch:
    description: Create a new release from the latest main, the version will be based on contents of zotero/package.json

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: "24"
  CUSTOM_NANOPUB_JS: false

jobs:
  # Only needed when relying on local nanopub-js, not npm package
  build-nanopub-js:
    if: ${{ vars.CUSTOM_NANOPUB_JS == 'true' }}
    uses: ./.github/workflows/build-nanopub-js.yml
    with:
      node-version: ${{ vars.NODE_VERSION }}
    secrets: inherit

  zotero-release:
    needs: [build-nanopub-js]
    if: ${{ !cancelled() && (needs.build-nanopub-js.result == 'success' || needs.build-nanopub-js.result == 'skipped') }}
    runs-on: ubuntu-latest
    # Based on: https://github.com/zotero-plugin-dev/workflows/blob/main/.github/workflows/release-plugin.yml
    # This job will:
    #  - Setup JS
    #  - Build plugin
    #  - Release plugin on Github
    #    - Tag the latest main with the version from package.json (fails if already exists), and also move the `release` tag there
    #    - Create a (pre)release on Github and attach the build xpi and source code
    #    - Create a secondary release under tag `release` to host update(-beta).json
    #    - Create a comment for the release using apexskier/github-release-commenter
    #  - Post a comment in related issues and close them using apexskier/github-release-commenter

    # Previously used instead of copied steps:
    # uses: zotero-plugin-dev/workflows/.github/workflows/release-plugin.yml@main
    # with:
    #   build: "cd zotero && npm run build"
    #   release: "cd zotero && npm run release"
    # secrets: inherit

    steps:
      # Only needed when relying on local nanopub-js, not npm package
      - name: Download nanopub-js artifact
        if: ${{ vars.CUSTOM_NANOPUB_JS == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: nanopub-js
          path: ../nanopub-js

      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
        with:
          fetch-all: true

      - name: Build
        run: cd zotero && npm run build

      - name: Release to GitHub
        run: cd zotero && npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
